<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="felt" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#1c3b30"/>
      <stop offset="60%" stop-color="#122a21"/>
      <stop offset="100%" stop-color="#0a1810"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9d49a"/>
      <stop offset="48%" stop-color="#b78c3c"/>
      <stop offset="52%" stop-color="#7c5a22"/>
      <stop offset="100%" stop-color="#d8b45a"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(216,180,90,0.22)"/>
      <stop offset="100%" stop-color="rgba(216,180,90,0)"/>
    </radialGradient>
    <g id="rune" stroke="#d8b45a" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M0,-13 L0,13 M0,-5 L9,-13 M0,5 L-9,13"/>
    </g>
    <g id="flourish" stroke="#d8b45a" stroke-width="2.5" fill="none" opacity="0.7">
      <path d="M0,0 C40,4 60,24 64,64 M0,0 C4,40 24,60 64,64 M22,22 q14,2 22,22"/>
      <circle cx="0" cy="0" r="4" fill="#d8b45a" stroke="none"/>
    </g>
    <path id="arcTop" d="M150,500 A350,350 0 0 1 850,500" fill="none"/>
    <path id="arcBot" d="M165,500 A335,335 0 0 0 835,500" fill="none"/>
  </defs>

  <polygon points="897.3,664.6 664.6,897.3 335.4,897.3 102.7,664.6 102.7,335.4 335.4,102.7 664.6,102.7 897.3,335.4"
           fill="url(#rim)"/>
  <polygon points="869.6,653.1 653.1,869.6 346.9,869.6 130.4,653.1 130.4,346.9 346.9,130.4 653.1,130.4 869.6,346.9"
           fill="url(#felt)" stroke="#0a1810" stroke-width="3"/>
  <polygon points="845,641 641,845 359,845 155,641 155,359 359,155 641,155 845,359"
           fill="none" stroke="#d8b45a" stroke-width="1.5" opacity="0.5"/>

  <circle cx="500" cy="500" r="300" fill="url(#centerGlow)"/>

  <g opacity="0.85">
    <circle cx="500" cy="500" r="372" fill="none" stroke="#d8b45a" stroke-width="1.5" opacity="0.55"/>
    <circle cx="500" cy="500" r="320" fill="none" stroke="#d8b45a" stroke-width="1" stroke-dasharray="2 14" opacity="0.6"/>
    <g>
      <use href="#rune" transform="rotate(0 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(30 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(60 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(90 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(120 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(150 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(180 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(210 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(240 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(270 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(300 500 500) translate(500 154)"/>
      <use href="#rune" transform="rotate(330 500 500) translate(500 154)"/>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="0 500 500" to="360 500 500" dur="120s" repeatCount="indefinite"/>
    </g>
  </g>

  <g opacity="0.5">
    <circle cx="500" cy="500" r="250" fill="none" stroke="#d8b45a" stroke-width="1" stroke-dasharray="1 9"/>
    <animateTransform attributeName="transform" attributeType="XML"
      type="rotate" from="360 500 500" to="0 500 500" dur="80s" repeatCount="indefinite"/>
  </g>

  <g transform="translate(500 500) scale(2.4) translate(-100 -100)"
     fill="none" stroke="#d8b45a" opacity="0.32">
    <polygon points="100,12 176,56 176,144 100,188 24,144 24,56" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="100,12 142,80 58,80" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M142,80 176,56 M142,80 176,144 M142,80 100,120 M58,80 24,56 M58,80 24,144 M58,80 100,120 M100,120 100,188" stroke-width="1.3" opacity="0.8"/>
  </g>
  <circle cx="500" cy="500" r="3" fill="#d8b45a">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>

  <text font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="26" letter-spacing="8" fill="#d8b45a" opacity="0.85">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">F A N T A S T İ K   P A Z A R</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-size="19" letter-spacing="6" fill="#d8b45a" opacity="0.6">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">Z A R   A T I P   R O L   Y A P I Y O R U Z</textPath>
  </text>

  <use href="#flourish" transform="translate(150 150)"/>
  <use href="#flourish" transform="translate(850 150) scale(-1 1)"/>
  <use href="#flourish" transform="translate(150 850) scale(1 -1)"/>
  <use href="#flourish" transform="translate(850 850) scale(-1 -1)"/>
</svg>
