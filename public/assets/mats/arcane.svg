<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- ARKANA BÜYÜ ÇEMBERİ — iç içe rün halkaları + dodecagram yıldız hatları -->
  <defs>
    <radialGradient id="aBg" cx="50%" cy="46%" r="60%">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="55%" stop-color="#100b22"/>
      <stop offset="100%" stop-color="#070510"/>
    </radialGradient>
    <radialGradient id="aGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(155,111,208,0.28)"/>
      <stop offset="50%" stop-color="rgba(216,180,90,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <radialGradient id="aVig" cx="50%" cy="50%" r="50%">
      <stop offset="58%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
    <g id="aRune" stroke="#d8b45a" stroke-width="3" stroke-linecap="round" fill="none">
      <path d="M0,-14 L0,14 M0,-6 L10,-14 M0,6 L-10,14"/>
    </g>
  </defs>

  <circle cx="500" cy="500" r="500" fill="url(#aBg)"/>
  <circle cx="500" cy="500" r="430" fill="url(#aGlow)"/>

  <!-- dış halkalar -->
  <circle cx="500" cy="500" r="396" fill="none" stroke="#d8b45a" stroke-width="2" opacity="0.55"/>
  <circle cx="500" cy="500" r="384" fill="none" stroke="#9b6fd0" stroke-width="1" opacity="0.5"/>

  <!-- dönen rün halkası -->
  <g opacity="0.85">
    <g>
      <use href="#aRune" transform="rotate(0 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(30 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(60 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(90 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(120 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(150 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(180 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(210 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(240 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(270 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(300 500 500) translate(500 134)"/>
      <use href="#aRune" transform="rotate(330 500 500) translate(500 134)"/>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="0 500 500" to="360 500 500" dur="140s" repeatCount="indefinite"/>
    </g>
    <circle cx="500" cy="500" r="356" fill="none" stroke="#d8b45a" stroke-width="1" opacity="0.45"/>
  </g>

  <!-- dodecagram: ters dönen yıldız hatları -->
  <g opacity="0.4" stroke="#9b6fd0" stroke-width="1.4" fill="none">
    <g>
      <polygon points="500,180 660,500 500,820 340,500"/>
      <polygon points="180,500 500,340 820,500 500,660"/>
      <polygon points="287,287 713,287 713,713 287,713"/>
      <animateTransform attributeName="transform" attributeType="XML"
        type="rotate" from="360 500 500" to="0 500 500" dur="180s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- iç halka — zarın oturduğu alan -->
  <circle cx="500" cy="500" r="250" fill="none" stroke="#d8b45a" stroke-width="1" stroke-dasharray="2 12" opacity="0.4"/>

  <circle cx="500" cy="500" r="500" fill="url(#aVig)"/>
</svg>
